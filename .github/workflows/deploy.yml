name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Pull every public repo. Fails the build on API error rather than
      # shipping an empty Afon Empire.
      - name: Sync GitHub
        run: npm run sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Rotate, strip EXIF, generate WebP variants.
      - name: Scan photos
        run: npm run photos

      - name: Build
        run: npm run build
        env:
          # Stamped into the inscription along the bottom of the map.
          PUBLIC_RUN_NUMBER: ${{ github.run_number }}
          # Set SITE_BASE to '/<repo>/' if this is a project page rather than
          # a user page.
          SITE_URL: ${{ vars.SITE_URL }}
          SITE_BASE: ${{ vars.SITE_BASE }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
